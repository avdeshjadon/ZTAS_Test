<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zero Trust Auth - Demo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- Notification Toast -->
        <div id="toast" class="toast hidden"></div>
        
        <!-- Authenticated State -->
        <div id="dashboard" class="dashboard hidden">
            <h2>Welcome Back!</h2>
            <div class="user-info">
                <p><strong>Name:</strong> <span id="user-name"></span></p>
                <p><strong>Email:</strong> <span id="user-email"></span></p>
            </div>
            <button id="logout-btn" class="btn primary-btn mt-4">Logout</button>
        </div>

        <!-- Auth Forms -->
        <div class="auth-wrapper" id="auth-wrapper">
            <div class="glass-panel">
                
                <!-- Toggle -->
                <div class="form-toggle">
                    <button class="toggle-btn active" id="login-toggle">Login</button>
                    <button class="toggle-btn" id="signup-toggle">Sign Up</button>
                </div>

                <!-- Login Form -->
                <form id="login-form" class="auth-form active">
                    <h3>Sign In</h3>
                    <div class="input-group">
                        <label for="login-email">Email</label>
                        <input type="email" id="login-email" required placeholder="you@example.com">
                    </div>
                    <div class="input-group">
                        <label for="login-password">Password</label>
                        <input type="password" id="login-password" required placeholder="••••••••">
                    </div>
                    <button type="submit" class="btn primary-btn">Sign In</button>
                </form>

                <!-- Signup Form -->
                <form id="signup-form" class="auth-form hidden">
                    <h3>Create Account</h3>
                    <div class="input-row">
                        <div class="input-group half">
                            <label for="signup-fname">First Name</label>
                            <input type="text" id="signup-fname" required placeholder="John">
                        </div>
                        <div class="input-group half">
                            <label for="signup-lname">Last Name</label>
                            <input type="text" id="signup-lname" required placeholder="Doe">
                        </div>
                    </div>
                    <div class="input-group">
                        <label for="signup-email">Email</label>
                        <input type="email" id="signup-email" required placeholder="you@example.com">
                    </div>
                    <div class="input-group">
                        <label for="signup-password">Password</label>
                        <input type="password" id="signup-password" required minlength="8" placeholder="••••••••">
                    </div>
                    <button type="submit" class="btn primary-btn">Create Account</button>
                </form>
            </div>
        </div>
    </div>
    
    <script src="app.js"></script>
</body>
</html>
